<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TinyTelegram - Distributed Messaging</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        #app {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 800px;
            height: 90vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-size: 24px;
            font-weight: 600;
        }

        .connection-status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #ef4444;
            animation: pulse 2s infinite;
        }

        .status-dot.connected {
            background: #10b981;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* Login Screen */
        #login-screen {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100%;
            padding: 40px;
        }

        #login-screen h2 {
            color: #1f2937;
            margin-bottom: 30px;
            font-size: 28px;
        }

        .login-form {
            width: 100%;
            max-width: 400px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            color: #4b5563;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 8px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.2s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn-primary {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.1s;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        /* Chat Screen */
        #chat-screen {
            display: none;
            flex-direction: column;
            height: 100%;
        }

        #chat-screen.active {
            display: flex;
        }

        /* Info Bar */
        .info-bar {
            background: #f3f4f6;
            padding: 12px 20px;
            border-bottom: 1px solid #e5e7eb;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
            color: #6b7280;
        }

        .info-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .info-item strong {
            color: #1f2937;
        }

        /* Messages Area */
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f9fafb;
        }

        .message {
            display: flex;
            margin-bottom: 16px;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.sent {
            justify-content: flex-end;
        }

        .message-bubble {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 12px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }

        .message.received .message-bubble {
            background: white;
            color: #1f2937;
        }

        .message.sent .message-bubble {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .message-meta {
            font-size: 11px;
            opacity: 0.7;
            margin-top: 4px;
        }

        .message-content {
            word-wrap: break-word;
            margin-bottom: 4px;
        }

        /* System Message */
        .system-message {
            text-align: center;
            color: #6b7280;
            font-size: 13px;
            margin: 16px 0;
            padding: 8px;
            background: #fef3c7;
            border-radius: 6px;
        }

        /* Input Area */
        .input-area {
            padding: 20px;
            background: white;
            border-top: 1px solid #e5e7eb;
        }

        .input-form {
            display: flex;
            gap: 12px;
        }

        .input-wrapper {
            flex: 1;
            display: flex;
            gap: 12px;
        }

        .input-wrapper input {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            font-size: 15px;
            transition: border-color 0.2s;
        }

        .input-wrapper input:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn-send {
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.1s;
            white-space: nowrap;
        }

        .btn-send:hover {
            transform: translateY(-2px);
        }

        .btn-send:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* Scrollbar */
        .messages-container::-webkit-scrollbar {
            width: 8px;
        }

        .messages-container::-webkit-scrollbar-track {
            background: #f1f1f1;
        }

        .messages-container::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }

        .messages-container::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        /* Reconnecting Overlay */
        .reconnecting-overlay {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .reconnecting-overlay.active {
            display: flex;
        }

        .reconnecting-box {
            background: white;
            padding: 30px;
            border-radius: 12px;
            text-align: center;
        }

        .spinner {
            border: 3px solid #f3f4f6;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div id="app">
        <div class="header">
            <h1>TinyTelegram</h1>
            <div class="connection-status">
                <div class="status-dot" id="status-dot"></div>
                <span id="status-text">Disconnected</span>
            </div>
        </div>

        <!-- Login Screen -->
        <div id="login-screen">
            <h2>Welcome to TinyTelegram</h2>
            <form class="login-form" id="login-form">
                <div class="form-group">
                    <label for="user-id">Your User ID</label>
                    <input
                        type="text"
                        id="user-id"
                        placeholder="e.g., alice"
                        required
                        autocomplete="off"
                    >
                </div>
                <div class="form-group">
                    <label for="gateway-url">Gateway URL</label>
                    <input
                        type="text"
                        id="gateway-url"
                        value="ws://localhost:8080/ws"
                        required
                    >
                </div>
                <button type="submit" class="btn-primary">Connect</button>
            </form>
        </div>

        <!-- Chat Screen -->
        <div id="chat-screen">
            <div class="info-bar">
                <div class="info-item">
                    <span>User:</span>
                    <strong id="info-user">-</strong>
                </div>
                <div class="info-item">
                    <span>Gateway:</span>
                    <strong id="info-gateway">-</strong>
                </div>
                <div class="info-item">
                    <span>Local PTS:</span>
                    <strong id="info-pts">0</strong>
                </div>
            </div>

            <div class="messages-container" id="messages"></div>

            <div class="input-area">
                <form class="input-form" id="message-form">
                    <div class="input-wrapper">
                        <input
                            type="text"
                            id="receiver-id"
                            placeholder="Receiver ID (e.g., bob)"
                            required
                            autocomplete="off"
                        >
                        <input
                            type="text"
                            id="message-input"
                            placeholder="Type your message..."
                            required
                            autocomplete="off"
                        >
                    </div>
                    <button type="submit" class="btn-send" id="send-btn">Send</button>
                </form>
            </div>
        </div>

        <!-- Reconnecting Overlay -->
        <div class="reconnecting-overlay" id="reconnecting-overlay">
            <div class="reconnecting-box">
                <div class="spinner"></div>
                <div>Reconnecting...</div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
